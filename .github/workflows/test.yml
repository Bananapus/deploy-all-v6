name: test
on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
jobs:
  forge-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: 25.9.0

      - name: Install npm dependencies
        run: npm install

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Build
        run: forge build --deny notes --skip "*/test/**"

      - name: Check contract sizes
        run: forge build --deny notes --sizes --skip "*/test/**" --skip "*/script/**" --skip SphinxUtils

  forge-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: 25.9.0

      - name: Install npm dependencies
        run: npm install

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Run tests
        # Runs the full suite so fork + integration test failures gate CI. NOTE: this job is expected to
        # fail until the test suite is triaged — enabling it (it never ran in CI before) surfaced a backlog
        # of pre-existing failures (artifact-file-dependent verifiers that need a generated artifacts/ dir,
        # sucker peer-config, verifier error-string drift, revnet permission/ownership, a defifa verifier).
        # --fail-fast is intentionally omitted so every failure is visible in one run for that triage.
        run: forge test --deny notes --summary --detailed --skip "*/script/**"
        env:
          RPC_ETHEREUM_MAINNET: ${{ secrets.RPC_ETHEREUM_MAINNET }}
          RPC_OPTIMISM_MAINNET: ${{ secrets.RPC_OPTIMISM_MAINNET }}
          RPC_BASE_MAINNET: ${{ secrets.RPC_BASE_MAINNET }}
          RPC_ARBITRUM_MAINNET: ${{ secrets.RPC_ARBITRUM_MAINNET }}
