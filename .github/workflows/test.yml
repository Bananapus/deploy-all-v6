name: test
on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
jobs:
  forge-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: 25.9.0

      - name: Install npm dependencies
        run: npm install

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Build
        run: forge build --deny notes --skip "*/test/**"

      - name: Check contract sizes
        run: forge build --deny notes --sizes --skip "*/test/**" --skip "*/script/**" --skip SphinxUtils

  forge-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: 25.9.0

      - name: Install npm dependencies
        run: npm install

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Generate deploy artifacts
        # The post-deploy verifier tests read the generated artifacts/ tree (gitignored), so build it first.
        # build-artifacts.sh is deterministic (forge build + cast keccak/create2 + jq) and needs no RPC.
        run: npm run artifacts

      - name: Run tests
        # Run the full suite so fork + integration test failures gate CI (this repo's CI previously only
        # built and never ran forge test). The four mainnet RPC secrets back the multi-chain fork tests.
        run: forge test --deny notes --summary --detailed --skip "*/script/**"
        env:
          RPC_ETHEREUM_MAINNET: ${{ secrets.RPC_ETHEREUM_MAINNET }}
          RPC_OPTIMISM_MAINNET: ${{ secrets.RPC_OPTIMISM_MAINNET }}
          RPC_BASE_MAINNET: ${{ secrets.RPC_BASE_MAINNET }}
          RPC_ARBITRUM_MAINNET: ${{ secrets.RPC_ARBITRUM_MAINNET }}
