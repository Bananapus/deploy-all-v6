name: test
on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
jobs:
  forge-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: 25.9.0

      - name: Install npm dependencies
        run: npm install

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Build
        run: forge build --deny notes --skip "*/test/**"

      - name: Check contract sizes
        run: forge build --deny notes --sizes --skip "*/test/**" --skip "*/script/**" --skip SphinxUtils

  forge-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: 25.9.0

      - name: Install npm dependencies
        run: npm install

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Run tests
        # Exclude the post-deploy artifact-verifier regression tests: they read generated files from the
        # gitignored artifacts/ dir (produced from a real deployment dump via `npm run artifacts`), so they
        # cannot run in a clean CI checkout. All fork + other integration/regression tests still gate CI.
        run: forge test --deny notes --summary --detailed --skip "*/script/**" --no-match-path "test/regression/(AddressDumpArtifactMismatch|PostDeployDistributeArtifactGap|PostDeployDynamicConstructorArgsGap|PostDeployLibraryVerificationGap|PostDeployStaleSourceArtifactGap|TokenImplementationVerifierGap).t.sol"
        env:
          RPC_ETHEREUM_MAINNET: ${{ secrets.RPC_ETHEREUM_MAINNET }}
          RPC_OPTIMISM_MAINNET: ${{ secrets.RPC_OPTIMISM_MAINNET }}
          RPC_BASE_MAINNET: ${{ secrets.RPC_BASE_MAINNET }}
          RPC_ARBITRUM_MAINNET: ${{ secrets.RPC_ARBITRUM_MAINNET }}
